[package]
name = "plugin-manifest"
description = "Plugin manifest structures for the Rust Plugin System — action contracts, compatibility, versioning, and maintenance metadata."
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
keywords = ["plugin", "manifest", "plugin-system", "ffi"]
categories = ["development-tools", "api-bindings"]
readme = "README.md"

[dependencies]
plugin-capabilities = { version = "0.1.0", path = "../plugin-capabilities" }
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
plugin-test-kit = { version = "0.1.0", path = "../plugin-test-kit" }
serde_json = "1.0.149"
