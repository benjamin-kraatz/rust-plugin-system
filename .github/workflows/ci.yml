name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: fmt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Lint workspace (Linux-safe set)
        run: >-
          cargo clippy --workspace --all-targets --locked
          --exclude host-egui
          --exclude host-iced
          --exclude host-dioxus-desktop
          --
          -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: clippy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build workspace (Linux-safe set)
        run: >-
          cargo build --workspace --locked
          --exclude host-egui
          --exclude host-iced
          --exclude host-dioxus-desktop

      - name: Run tests (Linux-safe set)
        run: >-
          cargo test --workspace --all-targets --locked
          --exclude host-egui
          --exclude host-iced
          --exclude host-dioxus-desktop

  # Checks public API semver compatibility of all publishable crates against
  # the current main branch baseline.  Only runs on pull requests so it never
  # blocks pushes to main (which are the releases themselves).
  semver-checks:
    name: semver-checks
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout PR branch (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      # Compare PR branch against origin/main.  No registry access is needed
      # because --baseline-rev resolves the baseline from local git history.
      # If a package has no prior published version the check passes gracefully.
      - name: Check semver compatibility against main
        run: |
          cargo semver-checks \
            --baseline-rev origin/main \
            -p plugin-capabilities \
            -p plugin-manifest \
            -p plugin-protocol \
            -p plugin-api \
            -p plugin-abi \
            -p plugin-runtime \
            -p plugin-wasm \
            -p plugin-sdk \
            -p plugin-loader \
            -p host-core \
            -p plugin-test-kit
