name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: fmt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Lint workspace (Linux-safe set)
        run: >-
          cargo clippy --workspace --all-targets --locked
          --exclude host-egui
          --exclude host-iced
          --exclude host-dioxus-desktop
          --
          -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: clippy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build workspace (Linux-safe set)
        run: >-
          cargo build --workspace --locked
          --exclude host-egui
          --exclude host-iced
          --exclude host-dioxus-desktop

      - name: Run tests (Linux-safe set)
        run: >-
          cargo test --workspace --all-targets --locked
          --exclude host-egui
          --exclude host-iced
          --exclude host-dioxus-desktop
