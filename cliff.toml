# git-cliff configuration — generates CHANGELOG.md from Conventional Commits.
#
# Generate manually:
#   git-cliff --output CHANGELOG.md
#
# Preview unreleased changes:
#   git-cliff --unreleased --output -
#
# Reference: https://git-cliff.org/docs/configuration

[changelog]
# Prepended to every generated CHANGELOG.md.
header = """
# Changelog

All notable changes to this project will be documented in this file.
The format follows [Conventional Commits](https://www.conventionalcommits.org/).
Versions follow [Semantic Versioning](https://semver.org/).\n
"""

# Template for each released version block (Tera syntax).
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING** {% endif %}\
  {{ commit.message | upper_first }} \
  ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/benjamin-kraatz/rust-plugin-system/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""

# Appended after all version blocks.
footer = """
---
_Generated by [git-cliff](https://git-cliff.org)_
"""

# Strip conventional commit type/scope prefix from the rendered message.
trim = true

[git]
# Only conventional commit messages are included.
conventional_commits = true
filter_unconventional = true
split_commits = false

# Parse commit body for additional breaking-change notices.
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^doc", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^security", group = "Security" },
    # Skip ci and automated release commits — they add no user-facing value.
    { message = "^ci", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Miscellaneous" },
]

# Only include commits that touch code since the last tag.
filter_commits = true

# Match release tags produced by cargo-release.
tag_pattern = "v[0-9].*"

# Ignore pre-release tags (alpha, beta, rc).
skip_tags = "v.*-(alpha|beta|rc).*"

# Ignore tags created by bots.
ignore_tags = ""

# Sort newest-first within each version block.
sort_commits = "newest"
